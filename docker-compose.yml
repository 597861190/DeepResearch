version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: deepresearch-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deepresearch-app
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  qdrant_data:
    name: deepresearch-qdrant-data
  huggingface_cache:
    name: deepresearch-hf-cache
